name: LLVM Build Action

on:
-   push
-   pull_request

permissions:
  contents: write

jobs:
    windowsBuild:
        name: Windows Build
        runs-on: windows-latest
        env:
            LLVM_VERSION: 22.1.5
            LLVM_MAJOR_VERSION: 22

        strategy:
            fail-fast: false
            matrix:
                CRT:
                -   msvcrt
                -   libcmt

                TARGET_CPU:
                -   amd64
                -   i386

                CONFIGURATION:
                -   Debug
                -   Release

        steps:
        -   name: Checkout repo
            uses: actions/checkout@v6

        -   name: Install
            shell: cmd
            run: |
                call %GITHUB_WORKSPACE%\set-env.bat msvc17 ${{matrix.CRT}} ${{matrix.TARGET_CPU}} ${{matrix.CONFIGURATION}}
                call %GITHUB_WORKSPACE%\install.bat

        -   name: Build and test
            id: BUILD
            shell: cmd
            run: |
                call %GITHUB_WORKSPACE%\set-env.bat msvc17 ${{matrix.CRT}} ${{matrix.TARGET_CPU}} ${{matrix.CONFIGURATION}}
                call %GITHUB_WORKSPACE%\build.bat
                echo DEPLOY_FILE=%DEPLOY_FILE% >> %GITHUB_OUTPUT%

        -   name: Release
            uses: softprops/action-gh-release@v3.0.0
            if: github.ref_type == 'tag'
            with:
                files: ${{steps.BUILD.outputs.DEPLOY_FILE}}